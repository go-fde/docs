site_name: go-fde
site_description: Pure-Go full-disk encryption — a unified dispatcher over LUKS1/LUKS2, APFS FileVault 2, and a plaintext passthrough backend. No cgo, no root, interoperable with cryptsetup and diskutil.
site_url: https://go-fde.github.io/docs/
repo_url: https://github.com/go-fde
repo_name: go-fde
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/weather-sunny, name: Light mode }
  features: [navigation.sections, navigation.top, content.code.copy, search.suggest]

extra_css: [stylesheets/brand.css]
extra:
  version:
    provider: mike

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Home: index.md
  - Components:
      - Overview: components/index.md
      - "fde — unified dispatcher": components/fde.md
      - "luks — LUKS1/LUKS2": components/luks.md
      - "apfs — APFS FileVault 2": components/apfs.md
      - "clear — plaintext passthrough": components/clear.md
